name = "ramsrinivasan-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database binding ───────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "ramsrinivasan-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# ── Custom domain (set after deploying) ──────────────────────────────────
# routes = [{ pattern = "api.ramsrinivasan.in/*", zone_name = "ramsrinivasan.in" }]

# ── Secrets (set via wrangler secret put, NOT here) ──────────────────────
# JWT_SECRET
# ADMIN_EMAIL
# ADMIN_PASSWORD
