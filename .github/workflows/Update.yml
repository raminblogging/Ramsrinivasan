name: Auto Update World Monitor

on:
  schedule:
    - cron: "0 0,3,6,9,12,15,18,21 * * *"  # Every 3 hours — 8 times a day
  workflow_dispatch:                          # Manual trigger from Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15        # Kill job if it runs longer than 15 min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run fetch script
        working-directory: Monitor
        run: python fetch.py

      - name: Commit and push updated news.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Monitor/news.json
          git diff --cached --quiet && echo "No changes — skipping commit" || (
            git commit -m "chore: auto-update news.json [$(date -u '+%Y-%m-%d %H:%M UTC')]" &&
            git push
          )
