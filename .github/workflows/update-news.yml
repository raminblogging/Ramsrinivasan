name: Update News Feed

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 mins (GitHub minimum reliable interval)
  workflow_dispatch:          # allow manual trigger from Actions tab

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run fetch script
        run: python Monitor/fetch.py

      - name: Commit and push news.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Monitor/news.json
          git diff --cached --quiet || git commit -m "chore: update news feed [skip ci]"
          git push
