<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>About — RamSrinivasan</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root{
--bg:#0d0d0d;
--bg2:#141414;
--surface:#1a1a1a;
--border:#2a2a2a;
--text:#e8e2d9;
--muted:#6b6560;
--accent:#c8a96e;
--accent2:#7eb8a4;
--serif:'DM Serif Display', Georgia, serif;
--mono:'DM Mono', monospace;
--sans:'DM Sans', sans-serif;
}

html{scroll-behavior:smooth;}
body{
background:var(--bg);
color:var(--text);
font-family:var(--sans);
font-size:16px;
line-height:1.7;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
pointer-events:none;
z-index:9999;
opacity:0.4;
}

/* NAV */
nav{
position:fixed;
top:0; left:0; right:0;
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding:1.4rem 3rem;
background:rgba(13,13,13,0.92);
border-bottom:1px solid var(--border);
backdrop-filter:blur(12px);
}

.nav-logo{
font-family:var(--serif);
font-size:1.3rem;
color:var(--accent);
text-decoration:none;
}

.nav-links{
display:flex;
gap:2rem;
list-style:none;
}

.nav-links a{
color:var(--muted);
text-decoration:none;
font-family:var(--mono);
font-size:0.78rem;
letter-spacing:0.12em;
text-transform:uppercase;
transition:0.2s;
}

.nav-links a:hover,
.nav-links a.active{
color:var(--accent);
}

/* CONTAINER ALIGNMENT */
.page-header,
.content-section,
.page-cta,
footer{
max-width:1100px;
margin-left:auto;
margin-right:auto;
}

/* HEADER */
.page-header{
padding:10rem 3rem 5rem;
display:grid;
grid-template-columns:1.1fr 0.9fr;
gap:4rem;
align-items:center;
border-bottom:1px solid var(--border);
}

.page-eyebrow{
font-family:var(--mono);
font-size:0.72rem;
letter-spacing:0.2em;
text-transform:uppercase;
color:var(--accent);
margin-bottom:1rem;
}

.page-header h1{
font-family:var(--serif);
font-size:clamp(3rem,7vw,5.5rem);
line-height:1.05;
}

.page-header h1 em{color:var(--accent);}

.header-desc{
color:var(--muted);
font-size:1.05rem;
line-height:1.85;
}

.header-desc strong{color:var(--text);}

/* SECTIONS */
.content-section{
padding:5rem 3rem;
border-bottom:1px solid var(--border);
}

.content-section:last-of-type{
border-bottom:none;
}

.section-label{
font-family:var(--mono);
font-size:0.72rem;
letter-spacing:0.2em;
text-transform:uppercase;
color:var(--accent);
margin-bottom:0.8rem;
display:flex;
align-items:center;
gap:1rem;
}

.section-label::after{
content:'';
flex:1;
height:1px;
background:var(--border);
}

h2{
font-family:var(--serif);
font-size:clamp(2rem,4vw,3rem);
margin-bottom:2rem;
}

/* STORY */
.story-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:4rem;
}

.story-col p{
color:var(--muted);
font-size:1.05rem;
margin-bottom:1.3rem;
line-height:1.85;
}

/* TIMELINE */
.timeline-item{
display:grid;
grid-template-columns:140px 1fr;
gap:2rem;
padding:1.8rem 0;
border-bottom:1px solid var(--border);
}

.tl-year{
font-family:var(--mono);
font-size:0.78rem;
color:var(--accent);
}

.tl-body h3{
font-family:var(--serif);
font-size:1.3rem;
margin-bottom:0.3rem;
}

.tl-org{
font-family:var(--mono);
font-size:0.75rem;
color:var(--accent2);
letter-spacing:0.1em;
text-transform:uppercase;
margin-bottom:0.7rem;
}

.tl-body p{
color:var(--muted);
font-size:0.95rem;
}

/* SKILLS */
.skills-section{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:1.5rem;
}

.skill-group{
background:var(--surface);
border:1px solid var(--border);
padding:1.8rem;
}

.skill-group h4{
font-family:var(--mono);
font-size:0.72rem;
letter-spacing:0.15em;
text-transform:uppercase;
color:var(--accent);
margin-bottom:1rem;
}

.skill-tag{
display:block;
padding:0.5rem 0;
border-bottom:1px solid var(--border);
font-size:0.9rem;
color:var(--muted);
}

.skill-tag:last-child{border-bottom:none;}

/* INTERESTS */
.interests-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:1.5rem;
}

.interest-card{
border:1px solid var(--border);
padding:2rem;
}

.interest-card h4{
font-family:var(--serif);
font-size:1.2rem;
margin-bottom:0.5rem;
}

.interest-card p{
color:var(--muted);
font-size:0.9rem;
}

/* CTA */
.page-cta{
padding:5rem 3rem;
text-align:center;
}

.page-cta h2{
font-family:var(--serif);
font-size:clamp(2rem,4vw,3rem);
margin-bottom:1.2rem;
}

.page-cta p{
color:var(--muted);
max-width:500px;
margin:0 auto 2rem;
}

.btn{
display:inline-block;
padding:0.85rem 2rem;
font-family:var(--mono);
font-size:0.78rem;
letter-spacing:0.1em;
text-transform:uppercase;
text-decoration:none;
border:1px solid var(--border);
color:var(--text);
margin:0 0.5rem;
transition:0.2s;
}

.btn-primary{
background:var(--accent);
color:#0d0d0d;
border-color:var(--accent);
}

.btn-primary:hover{
background:transparent;
color:var(--accent);
}

.btn:hover{
border-color:var(--accent);
color:var(--accent);
}

/* FOOTER */
footer{
border-top:1px solid var(--border);
padding:2.5rem 3rem;
display:flex;
justify-content:space-between;
align-items:center;
}

footer p{
font-family:var(--mono);
font-size:0.72rem;
color:var(--muted);
}

/* MOBILE */
@media(max-width:768px){

nav{padding:1rem 1.5rem;}

.page-header{
grid-template-columns:1fr;
padding:8rem 1.5rem 3rem;
gap:2rem;
}

.content-section{padding:3.5rem 1.5rem;}

.story-grid,
.skills-section,
.interests-grid{
grid-template-columns:1fr;
}

.timeline-item{
grid-template-columns:90px 1fr;
gap:1rem;
}

footer{
flex-direction:column;
gap:1rem;
text-align:center;
}
}
</style>
</head>

</p>
</div>

</body>
