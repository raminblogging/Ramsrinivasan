<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Loading… — Ram Srinivasan</title>
  <meta name="description" content="" id="meta-desc"/>
  <meta property="og:title" content="" id="og-title"/>
  <meta property="og:description" content="" id="og-desc"/>
  <meta property="og:type" content="article"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="robots" content="index, follow"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:       #F5F0E8;
      --bg2:      #EDE8DF;
      --surface:  #FFFFFF;
      --border:   #D4CAB8;
      --border2:  #C0B49E;
      --ink:      #1A1414;
      --ink2:     #3D3030;
      --muted:    #7A6E62;
      --red:      #E8192C;
      --blue:     #1E3EFF;
      --pink:     #E8196A;
      --yellow:   #FFD600;
      --cyan:     #0099CC;
      --dark:     #080810;
      --comic:    'Bangers', cursive;
      --body:     'Nunito', sans-serif;
      --mono:     'Space Mono', monospace;
      --serif:    'Merriweather', serif;
    }

    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.7;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(232,25,44,.06) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;z-index:0}

    /* READING PROGRESS */
    #progress-bar{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,var(--red),var(--yellow));z-index:2000;transition:width .1s linear}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;justify-content:space-between;align-items:center;padding:1rem 3rem;background:var(--dark);border-bottom:3px solid var(--red);backdrop-filter:blur(12px)}
    .nav-logo{font-family:var(--comic);font-size:2rem;color:var(--red);text-decoration:none;letter-spacing:.06em;text-shadow:2px 2px 0 var(--yellow);transition:transform .2s}
    .nav-logo:hover{transform:rotate(-3deg) scale(1.08)}
    .nav-links{display:flex;gap:2rem;list-style:none}
    .nav-links a{color:#8888AA;text-decoration:none;font-family:var(--comic);font-size:1.1rem;letter-spacing:.08em;transition:color .2s,text-shadow .2s}
    .nav-links a:hover{color:#FFE600;text-shadow:1px 1px 0 var(--red)}

    /* POST HERO — dark panel like comic cover */
    .post-hero{
      background:var(--dark);color:#F0EEFF;
      padding:5.5rem 3rem 2.5rem;
      max-width:900px;margin:0 auto;
      border-bottom:5px solid;
      border-image:linear-gradient(90deg,var(--red),var(--blue),var(--yellow)) 1;
      position:relative;overflow:hidden;
      opacity:0;animation:up .6s .1s forwards
    }
    .post-hero::before{
      content:'';position:absolute;inset:0;
      background:repeating-conic-gradient(from 0deg at 5% 50%,transparent 0deg,transparent 8.6deg,rgba(255,230,0,.015) 8.6deg,rgba(255,230,0,.015) 9deg);
      pointer-events:none
    }
    .post-hero-inner{position:relative;z-index:1}
    .post-back{
      display:inline-flex;align-items:center;gap:.5rem;
      font-family:var(--comic);font-size:.95rem;letter-spacing:.08em;
      color:#7070A0;text-decoration:none;
      border:2px solid rgba(255,255,255,.12);
      padding:.35rem 1rem;margin-bottom:1.5rem;
      transition:all .2s
    }
    .post-back:hover{color:var(--yellow);border-color:rgba(255,230,0,.4)}
    .post-back span{transition:transform .2s}
    .post-back:hover span{transform:translateX(-4px)}
    .post-tags{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
    .post-tag-item{
      font-family:var(--comic);font-size:.88rem;letter-spacing:.08em;
      color:var(--dark);background:var(--yellow);
      padding:.2rem .8rem;
      border:2px solid var(--dark)
    }
    .post-title-h1{
      font-family:var(--comic);
      font-size:clamp(2rem,5vw,3.8rem);
      line-height:1.0;letter-spacing:.02em;
      margin-bottom:.8rem;
      color:#F0EEFF;
      text-shadow:3px 3px 0 var(--red),5px 5px 0 rgba(232,25,44,.2)
    }
    .post-desc{font-size:1rem;color:#9090B0;line-height:1.75;margin-bottom:1.5rem;max-width:640px;font-family:var(--serif);font-style:italic}
    .post-meta{
      display:flex;gap:2rem;align-items:center;flex-wrap:wrap;
      padding:1rem 0;border-top:1px solid rgba(255,255,255,.08)
    }
    .meta-item{display:flex;flex-direction:column;gap:.2rem}
    .meta-label{font-family:var(--mono);font-size:.65rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:#5050A0}
    .meta-value{font-family:var(--mono);font-size:.78rem;color:#9090C0}

    /* COVER IMAGE */
    .post-cover{max-width:900px;margin:0 auto;opacity:0;animation:up .6s .25s forwards;overflow:hidden;border-bottom:3px solid var(--border)}
    .post-cover img{width:100%;max-height:440px;object-fit:cover;display:block}

    /* BODY — light paper reading experience */
    .post-body{
      max-width:680px;margin:0 auto;
      padding:3rem 3rem 4rem;
      background:var(--surface);
      position:relative;z-index:1;
      opacity:0;animation:up .6s .4s forwards;
      /* subtle left comic accent */
      border-left:4px solid var(--red);
      box-shadow:-4px 0 0 var(--red),4px 0 20px rgba(0,0,0,.06)
    }

    /* reading typography */
    .post-body h2{
      font-family:var(--comic);font-size:1.9rem;letter-spacing:.03em;
      margin:2.5rem 0 .7rem;line-height:1.1;color:var(--ink);
      padding-bottom:.4rem;border-bottom:3px solid var(--red)
    }
    .post-body h3{
      font-family:var(--comic);font-size:1.4rem;letter-spacing:.03em;
      margin:2rem 0 .5rem;line-height:1.15;
      color:var(--blue)
    }
    .post-body h4{
      font-family:var(--body);font-size:1rem;font-weight:900;
      margin:1.5rem 0 .4rem;color:var(--ink2);
      text-transform:uppercase;letter-spacing:.05em
    }
    .post-body p{
      color:var(--ink2);font-size:1rem;line-height:1.9;
      margin-bottom:1.4rem;
      font-family:var(--serif)
    }
    .post-body a{color:var(--blue);text-decoration:none;border-bottom:2px solid rgba(30,62,255,.3);transition:border-color .2s,color .2s}
    .post-body a:hover{color:var(--red);border-color:var(--red)}
    .post-body strong{color:var(--ink);font-weight:900;font-family:var(--body)}
    .post-body em{font-style:italic;color:var(--pink)}
    .post-body ul,.post-body ol{padding-left:1.8rem;margin-bottom:1.4rem}
    .post-body li{
      color:var(--ink2);font-size:1rem;line-height:1.85;
      margin-bottom:.4rem;font-family:var(--serif)
    }
    .post-body li::marker{color:var(--red)}
    .post-body blockquote{
      border-left:4px solid var(--yellow);
      margin:2rem 0;padding:1rem 1.4rem;
      background:rgba(255,214,0,.06);
      position:relative
    }
    .post-body blockquote::before{
      content:'"';
      font-family:var(--comic);font-size:3rem;color:var(--yellow);
      position:absolute;top:-.3rem;left:.5rem;line-height:1
    }
    .post-body blockquote p{
      color:var(--ink2);font-style:italic;margin-bottom:0;
      padding-left:1.5rem;font-size:.98rem
    }
    .post-body code{
      font-family:var(--mono);font-size:.82rem;
      background:rgba(30,62,255,.07);
      border:1px solid rgba(30,62,255,.2);
      padding:.15rem .45rem;color:var(--blue)
    }
    .post-body pre{
      background:var(--dark);
      border:3px solid var(--border2);
      border-left:4px solid var(--cyan);
      padding:1.4rem;overflow-x:auto;
      margin-bottom:1.5rem
    }
    .post-body pre code{background:none;border:none;padding:0;color:#A0E0FF}
    .post-body hr{border:none;border-top:3px solid var(--border);margin:2.5rem 0}
    .post-body img{max-width:100%;height:auto;display:block;margin:2rem auto;border:3px solid var(--border);box-shadow:4px 4px 0 var(--border)}

    /* KEY CALLOUT — comic style */
    .post-body .callout{
      background:rgba(232,25,44,.06);
      border:2px solid var(--red);
      border-left:5px solid var(--red);
      padding:1rem 1.2rem;margin:1.5rem 0
    }
    .post-body .callout::before{
      content:'⚡ ';font-family:var(--comic);color:var(--red)
    }

    /* POST FOOTER */
    .post-footer{
      max-width:680px;margin:0 auto;
      padding:1.5rem 3rem 2.5rem;
      background:var(--surface);
      border-top:3px solid var(--border);
      border-left:4px solid var(--blue);
      display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;
      position:relative;z-index:1;
      opacity:0;animation:up .6s .55s forwards
    }
    .share-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
    .share-label{font-family:var(--comic);font-size:.9rem;letter-spacing:.08em;color:var(--muted);margin-right:.3rem}
    .share-btn{
      font-family:var(--comic);font-size:.88rem;letter-spacing:.06em;
      padding:.3rem .9rem;border:2px solid var(--border);
      color:var(--muted);background:transparent;text-decoration:none;
      cursor:pointer;transition:all .15s
    }
    .share-btn:hover{color:var(--red);border-color:var(--red);background:rgba(232,25,44,.05)}
    .back-btn{
      display:inline-flex;align-items:center;gap:.5rem;
      font-family:var(--comic);font-size:.95rem;letter-spacing:.06em;
      color:#fff;background:var(--dark);
      text-decoration:none;padding:.5rem 1.2rem;
      border:2px solid var(--dark);
      box-shadow:3px 3px 0 var(--red);
      transition:all .2s
    }
    .back-btn:hover{transform:translate(-3px,-3px);box-shadow:6px 6px 0 var(--red)}

    /* RELATED POSTS */
    .related-section{
      max-width:900px;margin:0 auto;
      padding:2.5rem 3rem 4rem;
      position:relative;z-index:1;
      opacity:0;animation:up .6s .7s forwards
    }
    .related-label{
      font-family:var(--comic);font-size:1rem;letter-spacing:.15em;
      text-transform:uppercase;color:var(--red);
      display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem
    }
    .related-label::after{content:'';flex:1;height:3px;background:var(--border)}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
    .related-card{
      background:var(--surface);
      border:3px solid var(--border);
      padding:1.4rem;text-decoration:none;color:inherit;
      display:flex;flex-direction:column;gap:.5rem;
      position:relative;overflow:hidden;
      transition:border-color .2s,box-shadow .2s,transform .2s
    }
    .related-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);transform:scaleX(0);transform-origin:left;transition:transform .3s}
    .related-card:hover{border-color:var(--red);box-shadow:4px 4px 0 var(--red);transform:translate(-3px,-3px)}
    .related-card:hover::before{transform:scaleX(1)}
    .related-card:hover .rc-title{color:var(--red)}
    .rc-tag{font-family:var(--comic);font-size:.82rem;letter-spacing:.06em;color:var(--blue)}
    .rc-title{font-size:.92rem;font-weight:700;line-height:1.35;transition:color .2s;font-family:var(--body)}
    .rc-date{font-family:var(--mono);font-size:.68rem;color:var(--muted);margin-top:auto}

    /* NOT FOUND */
    .not-found{max-width:600px;margin:0 auto;padding:8rem 3rem 4rem;text-align:center;position:relative;z-index:1}
    .nf-code{font-family:var(--comic);font-size:5rem;color:var(--red);display:block;text-shadow:4px 4px 0 var(--yellow);margin-bottom:.5rem}
    .not-found h2{font-family:var(--comic);font-size:2.5rem;letter-spacing:.04em;margin-bottom:.8rem}
    .not-found p{color:var(--muted);margin-bottom:2rem;font-size:.95rem}
    .not-found a{
      display:inline-flex;align-items:center;gap:.5rem;
      font-family:var(--comic);font-size:1rem;letter-spacing:.08em;
      color:#fff;background:var(--red);padding:.7rem 1.8rem;
      text-decoration:none;
      border:3px solid var(--dark);box-shadow:4px 4px 0 var(--dark);
      transition:all .2s
    }
    .not-found a:hover{transform:translate(-3px,-3px);box-shadow:7px 7px 0 var(--dark)}

    /* FOOTER */
    footer{border-top:4px solid var(--dark);padding:1.8rem 3rem;background:var(--dark);display:flex;justify-content:space-between;align-items:center}
    footer p{font-family:var(--comic);font-size:.9rem;color:#8888AA;letter-spacing:.05em}
    footer a{color:var(--red);text-decoration:none}
    footer a:hover{color:var(--yellow)}

    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:768px){
      nav{padding:1rem 1.5rem}.nav-links{gap:1rem}.nav-links a{font-size:.9rem}
      .post-hero,.related-section{padding-left:1.5rem;padding-right:1.5rem}
      .post-hero{padding-top:5rem}
      .post-body,.post-footer{padding-left:1.5rem;padding-right:1.5rem;border-left:none;box-shadow:none}
      footer{flex-direction:column;gap:.8rem;text-align:center}
    }
  </style>
</head>
<body>

<div id="progress-bar" role="progressbar" aria-label="Reading progress"></div>

<nav>
  <a href="https://ramsrinivasan.in/" class="nav-logo">RM⊕</a>
  <ul class="nav-links">
    <li><a href="https://ramsrinivasan.in/about/">About</a></li>
    <li><a href="https://ramsrinivasan.in/work/">Work</a></li>
    <li><a href="https://ramsrinivasan.in/blog/">Blog</a></li>
    <li><a href="https://ramsrinivasan.in/contact/">Contact</a></li>
  </ul>
</nav>

<div id="app"></div>

<footer>
  <p>© 2026 <a href="https://ramsrinivasan.in/">Ram Srinivasan</a>. All rights reserved.</p>
  <p>Built with 🕸 &amp; ☕</p>
</footer>

<script>
'use strict';
const API = 'https://ramsrinivasan-api.rammv2001.workers.dev';

// ── READING PROGRESS ──
window.addEventListener('scroll', () => {
  const doc = document.documentElement;
  const pct = (doc.scrollTop / (doc.scrollHeight - doc.clientHeight)) * 100;
  document.getElementById('progress-bar').style.width = Math.min(pct, 100) + '%';
});

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}
function readTime(html) {
  const words = html.replace(/<[^>]*>/g, '').trim().split(/\s+/).length;
  return Math.max(1, Math.round(words / 200)) + ' min read';
}
function postUrl(post) {
  if (post.customUrl && post.customUrl !== '#') return post.customUrl;
  return `https://ramsrinivasan.in/blog/post.html?slug=${encodeURIComponent(post.slug)}`;
}

const params = new URLSearchParams(window.location.search);
const targetSlug = params.get('slug') || '';

function renderPost(post, allPosts) {
  // Update meta
  document.getElementById('page-title').textContent = `${post.title} — Ram Srinivasan`;
  document.title = `${post.title} — Ram Srinivasan`;
  document.getElementById('meta-desc').content   = post.description || '';
  document.getElementById('og-title').content    = post.title;
  document.getElementById('og-desc').content     = post.description || '';

  // Inject canonical + structured data
  const canon = document.createElement('link');
  canon.rel = 'canonical';
  canon.href = window.location.href.split('?')[0] + '?slug=' + encodeURIComponent(post.slug);
  document.head.appendChild(canon);

  const ld = document.createElement('script');
  ld.type = 'application/ld+json';
  ld.textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": post.title,
    "description": post.description || '',
    "datePublished": post.publishDate || post.createdAt,
    "author": { "@type": "Person", "name": "Ram Srinivasan" },
    "publisher": { "@type": "Person", "name": "Ram Srinivasan" }
  });
  document.head.appendChild(ld);

  // GA injection
  const gaId = post.gaId || 'G-ZH170NH9GW';
  if (!document.getElementById('ga-script') && gaId) {
    const s1 = document.createElement('script');
    s1.id = 'ga-script'; s1.async = true;
    s1.src = `https://www.googletagmanager.com/gtag/js?id=${gaId}`;
    document.head.appendChild(s1);
    const s2 = document.createElement('script');
    s2.id = 'ga-inline';
    s2.textContent = `window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','${gaId}');`;
    document.head.appendChild(s2);
  }

  const related = allPosts
    .filter(p => p.id !== post.id && (p.tags || []).some(t => (post.tags || []).includes(t)))
    .slice(0, 3);

  document.getElementById('app').innerHTML = `
    <article>
      <div class="post-hero">
        <div class="post-hero-inner">
          <a href="https://ramsrinivasan.in/blog/" class="post-back"><span>←</span> Back to Blog</a>
          ${(post.tags || []).length
            ? `<div class="post-tags">${(post.tags || []).map(t => `<span class="post-tag-item">${t}</span>`).join('')}</div>`
            : ''}
          <h1 class="post-title-h1">${post.title}</h1>
          ${post.description ? `<p class="post-desc">${post.description}</p>` : ''}
          <div class="post-meta">
            <div class="meta-item">
              <span class="meta-label">Published</span>
              <span class="meta-value">${fmtDate(post.publishDate || post.createdAt)}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Reading Time</span>
              <span class="meta-value">${readTime(post.content || '')}</span>
            </div>
            ${(post.tags || []).length
              ? `<div class="meta-item"><span class="meta-label">Topics</span><span class="meta-value">${(post.tags || []).join(', ')}</span></div>`
              : ''}
          </div>
        </div>
      </div>

      ${post.featuredImage
        ? `<div class="post-cover"><img src="${post.featuredImage}" alt="${post.title}" loading="eager"/></div>`
        : ''}

      <div class="post-body">${post.content || '<p>No content yet.</p>'}</div>

      <div class="post-footer">
        <div class="share-row">
          <span class="share-label">Share</span>
          <a class="share-btn" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(post.title)}&url=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener">X / Twitter</a>
          <a class="share-btn" href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener">LinkedIn</a>
          <button class="share-btn" onclick="copyLink()">Copy Link</button>
        </div>
        <a href="https://ramsrinivasan.in/blog/" class="back-btn">← All Posts</a>
      </div>
    </article>

    ${related.length ? `
      <section class="related-section" aria-label="Related posts">
        <div class="related-label">More to Read</div>
        <div class="related-grid">
          ${related.map(r => `
            <a class="related-card" href="${postUrl(r)}" aria-label="${r.title}">
              <span class="rc-tag">${(r.tags || [])[0] || ''}</span>
              <span class="rc-title">${r.title}</span>
              <span class="rc-date">${fmtDate(r.publishDate || r.createdAt)}</span>
            </a>`).join('')}
        </div>
      </section>` : ''}
  `;
}

function renderNotFound() {
  document.title = 'Post Not Found — Ram Srinivasan';
  document.getElementById('app').innerHTML = `
    <div class="not-found">
      <span class="nf-code">404</span>
      <h2>Post Not Found</h2>
      <p>This post doesn't exist or may have been removed.</p>
      <a href="https://ramsrinivasan.in/blog/">← Back to all posts</a>
    </div>`;
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href)
    .then(() => alert('Link copied!'))
    .catch(() => {});
}

async function loadPost() {
  if (!targetSlug) { renderNotFound(); return; }
  try {
    const [post, allPosts] = await Promise.all([
      fetch(API + `/api/blogs/${encodeURIComponent(targetSlug)}`).then(r => { if (!r.ok) throw new Error(); return r.json(); }),
      fetch(API + '/api/blogs').then(r => r.json()).catch(() => [])
    ]);
    renderPost(post, Array.isArray(allPosts) ? allPosts : []);
  } catch {
    renderNotFound();
  }
}

loadPost();
</script>
</body>
</html>
